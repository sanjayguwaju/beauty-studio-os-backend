version: "3.9"

services:
  api:
    build: 
      context: .
      dockerfile: Dockerfile
    restart: always
    ports:
      - "8000:8000"
    environment:
      - NODE_ENV=production
      - PORT=8000
      - MONGO_URI=mongodb://mongo:27017/beauty_studio_os
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=your_super_secret_jwt_key
      - ALLOWED_ORIGINS=https://your-frontend-domain.com
    depends_on:
      - mongo
      - redis

  mongo:
    image: mongo:7
    restart: always
    volumes:
      - mongo_prod_data:/data/db

  redis:
    image: redis:7-alpine
    restart: always
    volumes:
      - redis_prod_data:/data

volumes:
  mongo_prod_data:
  redis_prod_data:
